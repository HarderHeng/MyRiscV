# ============================================================
# OpenOCD 配置：MyRiscV JTAG DTM
# 基于 RISC-V Debug Spec v0.13.2
# ============================================================
# 用法：
#   openocd -f openocd.cfg -c "program helloworld.bin 0x20000000 verify reset exit"
# ============================================================

# 调试器适配器（使用 FT2232 兼容适配器）
adapter driver ftdi
ftdi_device_desc "Dual RS232-HS"
ftdi_vid_pid 0x0403 0x6010

# 使用 FT2232 的 A 通道（JTAG 接口）
ftdi_channel 0
ftdi_layout_init 0x0008 0x001b

# JTAG 速度
adapter speed 1000

# JTAG 引脚定义（根据实际接线调整）
# TCK=TDI, TMS=TDO, TDI=TCK, TDO=TCK 的反转取决于适配器
ftdi_layout_signal nTRST -data 0x0100
ftdi_layout_signal nSRST -data 0x0200

# 重置配置
reset_config trst_and_srst separate
adapter assert trst_assert srst
adapter deassert trst_deassert srst

# TAP 声明（5 位 IR，IR 前缀 2 位）
jtag newtap riscv cpu -irlen 5 -expected-id 0x00000001

# RISC-V 调试模块配置
set _CHIPNAME riscv
set _TARGETNAME $_CHIPNAME.cpu

# 创建目标（hart 0）
target create $_TARGETNAME riscv -chain-position $_TARGETNAME
riscv set_hartid 0 0

# 调试模块地址（根据 SoC 设计）
# dmcontrol/dmstatus 等寄存器通过 DMI 访问
riscv set_dmaddr 0x10000000

# 工作区（用于下载二进制）
$_TARGETNAME configure -work-area-phys 0x80004000 -work-area-size 0x1000 -work-area-backup 0

# Flash 配置（片上 Flash，0x20000000 起始）
# 使用虚拟地址模式
flash bank myriscv_flash riscv 0x20000000 0 0 0 $_TARGETNAME

# 初始化
init

# 重置目标
reset halt

echo "OpenOCD initialized. Ready for JTAG commands."
